name: Terraform Plan (PR)

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'backend-configs/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Plan ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - management
          - security
          - logging
          - networking
          - sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_PLAN_ROLE_{0}', upper(matrix.environment))] }}
          aws-region: eu-west-2
        continue-on-error: true
        id: aws-auth

      - name: Terraform Init
        id: init
        working-directory: environments/${{ matrix.environment }}
        run: |
          terraform init \
            -backend-config=../../backend-configs/${{ matrix.environment }}.hcl \
            -input=false
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        working-directory: environments/${{ matrix.environment }}
        if: steps.init.outcome == 'success' && steps.aws-auth.outcome == 'success'
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post Plan Comment
        uses: actions/github-script@v7
        if: always()
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          AUTH_OUTCOME: ${{ steps.aws-auth.outcome }}
        with:
          script: |
            const fs = require('fs');
            const env = process.env.ENVIRONMENT;
            const initOutcome = process.env.INIT_OUTCOME;
            const planOutcome = process.env.PLAN_OUTCOME;
            const authOutcome = process.env.AUTH_OUTCOME;

            let planOutput = '';
            try {
              const raw = fs.readFileSync(`environments/${env}/plan.txt`, 'utf8');
              // Truncate to stay within GitHub comment limits
              planOutput = raw.length > 60000
                ? raw.substring(0, 60000) + '\n...(truncated)'
                : raw;
            } catch (e) {
              planOutput = '(plan output not available)';
            }

            let statusEmoji = '✅';
            let statusText = 'succeeded';
            if (authOutcome !== 'success') {
              statusEmoji = '⚠️';
              statusText = 'skipped (no AWS credentials configured for this environment)';
            } else if (initOutcome !== 'success') {
              statusEmoji = '❌';
              statusText = 'failed at init';
            } else if (planOutcome !== 'success') {
              statusEmoji = '❌';
              statusText = 'failed';
            }

            const body = [
              `### ${statusEmoji} Terraform Plan — \`${env}\` ${statusText}`,
              '',
              authOutcome !== 'success'
                ? `> **Note:** Configure \`AWS_PLAN_ROLE_${env.toUpperCase()}\` in repository secrets to enable automatic planning for this environment.`
                : '',
              '',
              '<details>',
              `<summary>Show Plan Output</summary>`,
              '',
              '```hcl',
              planOutput,
              '```',
              '</details>',
            ].join('\n');

            // Find and update existing comment, or create a new one
            const marker = `<!-- tf-plan-${env} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: marker + '\n' + body,
              });
            }
